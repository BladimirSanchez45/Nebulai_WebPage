<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/nebulaiLogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NebulAi</title>
    <script>
      // Aplica el tema guardado antes de pintar (evita parpadeo). Claro por defecto.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
